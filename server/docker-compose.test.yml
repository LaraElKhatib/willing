version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: willing-test-postgres
    env_file:
      - .env.test
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    ports:
      - "${POSTGRES_PORT}:5432"

  adminer:
    image: adminer
    container_name: willing-test-adminer
    environment:
      ADMINER_DESIGN: brade
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "5050:8080"
    depends_on:
      - postgres
